<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>OSMM</title>
  </head>
  <body style="margin:0;background:#faf9f4;color:#16181d;font-family:Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#faf9f4;">
      <tr>
        <td align="center">
          <table role="presentation" width="640" cellspacing="0" cellpadding="0" style="max-width:640px;width:100%;background:#ffffff;">
            <tr>
              <td style="background:#16161c;color:#ffffff;padding:24px 32px;font-size:24px;font-weight:700;letter-spacing:0.04em;">
                OSMM
              </td>
            </tr>
            <tr>
              <td style="padding:32px;color:#16181d;font-size:16px;line-height:1.5;">
                {% block body %}{% endblock %}
              </td>
            </tr>
            <tr>
              <td style="background:#efeee9;color:#555555;padding:16px 32px;font-size:13px;">
                OSMM — Open Source Makerspace Manager
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
