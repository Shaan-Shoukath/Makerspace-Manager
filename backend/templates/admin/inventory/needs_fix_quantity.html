{% extends "admin/base_site.html" %}

{% block content %}
<form method="post" action="{{ request.path }}">
  {% csrf_token %}
  <input type="hidden" name="action" value="{{ action_name }}">
  {% for obj in queryset %}
    <input type="hidden" name="{{ action_checkbox_name }}" value="{{ obj.pk }}">
  {% endfor %}

  <fieldset class="module aligned">
    <div class="form-row">
      <label>Product:</label>
      <div class="readonly">{{ product }}</div>
    </div>
    <div class="form-row">
      <label>Needs fix:</label>
      <div class="readonly">{{ product.needs_fix_quantity }}</div>
    </div>
    <div class="form-row">
      <label for="id_quantity">Quantity to {{ action_label }}:</label>
      <input id="id_quantity" type="number" name="quantity" min="1" required>
    </div>
  </fieldset>

  <div class="submit-row">
    <input type="submit" name="apply" value="{{ action_label|title }} units">
  </div>
</form>
{% endblock %}
