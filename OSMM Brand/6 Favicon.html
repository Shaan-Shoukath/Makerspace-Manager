<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OSMM — Favicon</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;}
  html,body{height:100%;}
  body{background:#e9e8e2;display:grid;place-items:center;font-family:'Space Grotesk',sans-serif;padding:40px;}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:40px;}
  h1{font-size:14px;letter-spacing:.2em;text-transform:uppercase;color:#777;font-weight:600;}
  .sizes{display:flex;align-items:flex-end;gap:34px;}
  .grp{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .tile{background:#0c0d10;border-radius:24%;display:grid;place-items:center;box-shadow:0 8px 20px rgba(0,0,0,.18);}
  .tile svg{width:66%;height:66%;}
  .s64{width:64px;height:64px;} .s32{width:32px;height:32px;} .s16{width:16px;height:16px;}
  .lbl{font-size:11px;color:#888;font-weight:600;}
  /* browser tab mock */
  .tab{display:flex;align-items:center;gap:9px;background:#fff;border-radius:11px 11px 0 0;padding:11px 16px;width:280px;box-shadow:0 8px 20px rgba(0,0,0,.12);border:1px solid #e6e5df;border-bottom:none;}
  .tab .fav{width:18px;height:18px;border-radius:5px;background:#0c0d10;display:grid;place-items:center;flex:none;}
  .tab .fav svg{width:70%;height:70%;}
  .tab .ttl{font-size:13px;color:#333;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tab .x{margin-left:auto;color:#aaa;font-size:14px;}
</style>
</head>
<body>
  <div class="wrap">
    <h1>OSMM · Favicon</h1>
    <div class="sizes">
      <div class="grp"><div class="tile s64" data-i></div><div class="lbl">64</div></div>
      <div class="grp"><div class="tile s32" data-i></div><div class="lbl">32</div></div>
      <div class="grp"><div class="tile s16" data-i></div><div class="lbl">16</div></div>
    </div>
    <div class="tab"><span class="fav" data-i></span><span class="ttl">OSMM — Makerspace Manager</span><span class="x">&times;</span></div>
  </div>

  <template id="mark">
    <svg viewBox="0 0 64 64" fill="none" role="img" aria-label="OSMM">
      <polygon points="8,22 2,10 28,10 32,22" stroke="#fff" stroke-width="3.4" stroke-linejoin="round" stroke-linecap="round"></polygon>
      <polygon points="32,22 36,10 62,10 56,22" stroke="#fff" stroke-width="3.4" stroke-linejoin="round" stroke-linecap="round"></polygon>
      <rect x="8" y="22" width="48" height="34" rx="5" stroke="#fff" stroke-width="3.4"></rect>
      <rect x="12" y="27" width="18" height="11" rx="2.5" fill="#7dd3fc"></rect>
      <rect x="34" y="27" width="18" height="11" rx="2.5" fill="#fcdf46"></rect>
      <rect x="12" y="42" width="18" height="11" rx="2.5" fill="#74dd9c"></rect>
      <rect x="34" y="42" width="18" height="11" rx="2.5" fill="#f9a8d4"></rect>
      <g class="px" font-family="'Press Start 2P',monospace" font-size="6" text-anchor="middle">
        <text x="21" y="35.5" fill="#00374a">O</text><text x="43" y="35.5" fill="#3d3400">S</text>
        <text x="21" y="50.5" fill="#00321b">M</text><text x="43" y="50.5" fill="#5a1633">M</text>
      </g>
    </svg>
  </template>
  <script>
    const tpl=document.getElementById('mark').content;
    document.querySelectorAll('[data-i]').forEach(t=>{
      const c=tpl.cloneNode(true);
      if(t.classList.contains('s16')){ const g=c.querySelector('.px'); if(g) g.remove(); }
      t.appendChild(c);
    });
  </script>
</body>
</html>
