<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OSMM — Logo on Light</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{ --ink:#16181d; --bg:#faf9f4; }
  *{box-sizing:border-box;margin:0;}
  html,body{height:100%;}
  body{background:var(--bg);display:grid;place-items:center;font-family:'Space Grotesk',sans-serif;}
  .lockup{display:flex;align-items:center;gap:clamp(16px,2.6vw,38px);color:var(--ink);}
  .crate{height:clamp(74px,12vw,152px);width:auto;color:var(--ink);display:block;}
  .word{font-weight:700;font-size:clamp(46px,8.5vw,128px);line-height:1;letter-spacing:.03em;}
  .cap{position:fixed;left:24px;bottom:20px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);opacity:.32;font-weight:500;}
</style>
</head>
<body>
  <div class="lockup">
    <svg class="crate" viewBox="0 0 64 64" fill="none" role="img" aria-label="OSMM logomark">
      <polygon points="8,22 2,10 28,10 32,22" stroke="currentColor" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"></polygon>
      <polygon points="32,22 36,10 62,10 56,22" stroke="currentColor" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"></polygon>
      <rect x="8" y="22" width="48" height="34" rx="5" stroke="currentColor" stroke-width="3"></rect>
      <rect x="12" y="27" width="18" height="11" rx="2.5" fill="#7dd3fc"></rect>
      <rect x="34" y="27" width="18" height="11" rx="2.5" fill="#fcdf46"></rect>
      <rect x="12" y="42" width="18" height="11" rx="2.5" fill="#74dd9c"></rect>
      <rect x="34" y="42" width="18" height="11" rx="2.5" fill="#f9a8d4"></rect>
    </svg>
    <span class="word">OSMM</span>
  </div>
  <div class="cap">OSMM · Light background</div>
</body>
</html>
