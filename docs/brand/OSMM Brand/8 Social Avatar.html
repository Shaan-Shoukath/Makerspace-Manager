<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OSMM — Social Avatar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;}
  html,body{height:100%;}
  body{background:#e9e8e2;display:grid;place-items:center;font-family:'Space Grotesk',sans-serif;padding:40px;}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:36px;}
  h1{font-size:14px;letter-spacing:.2em;text-transform:uppercase;color:#777;font-weight:600;}
  .row{display:flex;align-items:flex-end;gap:34px;flex-wrap:wrap;justify-content:center;}
  .grp{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .av{border-radius:50%;display:grid;place-items:center;box-shadow:0 12px 30px rgba(0,0,0,.18);overflow:hidden;}
  .av svg{width:60%;height:60%;}
  .dark{background:radial-gradient(120% 120% at 30% 22%, #1d2027, #0c0d10);}
  .blue{background:linear-gradient(160deg,#0b3a4d,#07242f);}
  .light{background:#fff;}
  .big{width:180px;height:180px;} .mid{width:96px;height:96px;} .sm{width:56px;height:56px;}
  .lbl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#888;font-weight:600;}
</style>
</head>
<body>
  <div class="wrap">
    <h1>OSMM · Social Avatar</h1>
    <div class="row">
      <div class="grp"><div class="av dark big" data-i></div><div class="lbl">Dark</div></div>
      <div class="grp"><div class="av blue big" data-i></div><div class="lbl">Brand blue</div></div>
      <div class="grp"><div class="av light big" data-i data-dark></div><div class="lbl">Light</div></div>
    </div>
    <div class="row">
      <div class="grp"><div class="av dark mid" data-i></div><div class="lbl">96</div></div>
      <div class="grp"><div class="av dark sm" data-i></div><div class="lbl">56</div></div>
    </div>
  </div>

  <template id="mark">
    <svg viewBox="0 0 64 64" fill="none" role="img" aria-label="OSMM">
      <polygon points="8,22 2,10 28,10 32,22" stroke="var(--mk)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"></polygon>
      <polygon points="32,22 36,10 62,10 56,22" stroke="var(--mk)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"></polygon>
      <rect x="8" y="22" width="48" height="34" rx="5" stroke="var(--mk)" stroke-width="3"></rect>
      <rect x="12" y="27" width="18" height="11" rx="2.5" fill="#7dd3fc"></rect>
      <rect x="34" y="27" width="18" height="11" rx="2.5" fill="#fcdf46"></rect>
      <rect x="12" y="42" width="18" height="11" rx="2.5" fill="#74dd9c"></rect>
      <rect x="34" y="42" width="18" height="11" rx="2.5" fill="#f9a8d4"></rect>
      <g font-family="'Press Start 2P',monospace" font-size="6" text-anchor="middle">
        <text x="21" y="35.5" fill="#00374a">O</text><text x="43" y="35.5" fill="#3d3400">S</text>
        <text x="21" y="50.5" fill="#00321b">M</text><text x="43" y="50.5" fill="#5a1633">M</text>
      </g>
    </svg>
  </template>
  <script>
    const tpl=document.getElementById('mark').content;
    document.querySelectorAll('[data-i]').forEach(t=>{
      const svg=tpl.cloneNode(true);
      svg.querySelector('svg').style.setProperty('--mk', t.hasAttribute('data-dark') ? '#16181d' : '#ffffff');
      t.appendChild(svg);
    });
  </script>
</body>
</html>
